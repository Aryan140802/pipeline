- stage: Release
  displayName: Deploy Stage
  dependsOn:
    - Validation_Stage
    - Build
  condition: |
    and(
      succeeded('Build'),
      eq(dependencies.Validation_Stage.outputs['Validation_Job.val_task.DeployFlag'], 'true'),
      ne(variables['Build.SourceBranchName'], 'main')
    )
  jobs:
    - job: Show_Properties_For_Approval
      displayName: Display Override Properties
      steps:
        - download: current
          artifact: drop
        - task: CmdLine@2
          displayName: Read override.properties
          name: read_props
          inputs:
            script: |
              OVERRIDE_FILE="$(Pipeline.Workspace)/drop/override.properties"
              if [ -f "$OVERRIDE_FILE" ]; then
                CONTENT=$(cat "$OVERRIDE_FILE")
                echo "##vso[task.setvariable variable=OverrideContent;isOutput=true]$CONTENT"
              else
                echo "##vso[task.setvariable variable=OverrideContent;isOutput=true]override.properties not found"
              fi

    - job: Approve_Deployment
      displayName: Approve Deployment
      dependsOn: Show_Properties_For_Approval
      variables:
        propsContent: $[ dependencies.Show_Properties_For_Approval.outputs['read_props.OverrideContent'] ]
      steps:
        - task: ManualValidation@0
          displayName: Review Override Properties Before Deployment
          inputs:
            notifyUsers: |
              $(Build.RequestedForEmail)
            instructions: |
              ============================================
              Please review the override properties below
              before approving the deployment to $(Build.SourceBranchName):
              ============================================

              $(propsContent)

              ============================================
              Approve only if the above values are correct
              ============================================
            onTimeout: reject
            timeout: 1440  # 24 hours in minutes

    - deployment: DeployApp
      displayName: Deployment Job
      dependsOn: Approve_Deployment
      environment: $(Build.SourceBranchName)
      workspace:
        clean: all
      strategy:
        runOnce:
          deploy:
            steps:
              # ... your existing deploy steps unchanged ...
