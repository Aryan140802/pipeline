- stage: Build
  displayName: Build Stage
  jobs:
    - job: AgentBuildJob
      displayName: Agent Build job
      steps:
        # ... your existing build steps ...

    - job: Display_Override_Properties
      displayName: Display Override Properties
      dependsOn: AgentBuildJob
      steps:
        - download: current
          artifact: drop
        - task: CmdLine@2
          displayName: Display override.properties
          inputs:
            script: |
              set -e
              echo "========== Searching override.properties =========="
              find "$(Pipeline.Workspace)/drop" -name "override.properties" -exec echo "Found: {}" \;

              OVERRIDE_FILE="$(Pipeline.Workspace)/drop/override.properties"
              if [ -f "$OVERRIDE_FILE" ]; then
                echo "========== override.properties contents =========="
                cat "$OVERRIDE_FILE"
                echo "=================================================="
              else
                echo "WARNING: override.properties not found, listing drop artifact contents:"
                find "$(Pipeline.Workspace)/drop" -type f
              fi
