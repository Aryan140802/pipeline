stages:
# ============== Validation and Initilization ============
- stage: Validation_Stage
  displayName: Validation and Intialization
  pool:
    name: TFS-RH-1
  # NEW: Skip Validation entirely when triggered by a Pull Request.
  # For PRs (e.g. feature -> main), only the Build stage should run as a sanity check.
  # Validation reads from {BRANCH}_config.yml in eis-configurations repo — for main
  # this file does not exist, so yq would write an empty file and crash the pipeline.
  # By skipping Validation on PR, Release and Cache are also automatically skipped
  # since they depend on Validation succeeding.
  # Normal branch pushes (Build.Reason = IndividualCI) are not affected.
  condition: ne(variables['Build.Reason'], 'PullRequest')
  jobs:
    - job: Validation_Job
      displayName: Validation
      workspace:
        clean: all
      steps:

        - checkout: self
          path: s/app

        - checkout: git://devops_testing/eis-configuration@refs/heads/config
          path: s/eis-configurations

        - task: CmdLine@2
          name: val_task
          env:
            BRANCH: $(Build.SourceBranchName)
          displayName: Validating repository
          inputs:
            script: |
              set -e

              applicationName=$(ls -1 $(Build.SourcesDirectory)/app | grep -vE "Config|README.md|azure-pipelines.yml" | tail -n 1)
              echo "Application name : $applicationName"
              echo "branch: $BRANCH"
              echo "DONE 1"
              if [ ! -e $(Build.SourcesDirectory)/app/Config ]; then
                echo "DONE 2"
                mkdir -p $(Build.SourcesDirectory)/app/Config
                echo "DONE 3"
              fi

              echo "DONE 4"
              yq e ".$applicationName | select(. !=null)" $(Build.SourcesDirectory)/eis-configurations/"$BRANCH"_config.yml > $(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml
              echo "DONE 5"

              if [ -s $(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml ]; then
                echo "IN config_eis_configuration.yml"
                config_path=$(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml
                cp "$config_path" $(Build.ArtifactStagingDirectory)
              elif [ -s $(Build.SourcesDirectory)/app/Config/config.yml ]; then
                echo "IN config.yml"
                yq e ".$BRANCH" $(Build.SourcesDirectory)/app/Config/config.yml > $(Build.SourcesDirectory)/app/Config/temp.yml && mv $(Build.SourcesDirectory)/app/Config/temp.yml $(Build.SourcesDirectory)/app/Config/config.yml
                config_path=$(Build.SourcesDirectory)/app/Config/config.yml
                cat "$config_path"
                cp "$config_path" $(Build.ArtifactStagingDirectory)
              else
                echo "ERROR: config.yml not found"
                exit 1
              fi

              REQUIRED_FIELDS=(
                IntegrationNode
                IntegrationServer
              )
              for field in "${REQUIRED_FIELDS[@]}"; do
                value=$(yq e ".$field // \"\"" "$config_path" | tr -d '[:space:]')
                echo "Value: $value"
                if [ -z "$value" ]; then
                  echo " ERROR: $field is missing or empty "
                  exit 1
                fi
              done

              DEPLOY=$(yq e ".Deploy" "$config_path" | tr -d '[:space:]')
              CACHE_PRESENT=$(yq e ".Cache // [] | length > 0" "$config_path" | tr -d '[:space:]')
              echo "CACHE: $CACHE_PRESENT DEPLOY: $DEPLOY"

              # FIX 1 (DEPLOY): Broken bracket syntax - original was:
              #   if [ "$DEPLOY" = false ] || [ "$DEPLOY" = "false" || "$DEPLOY" = "False" ]; then
              #   The second [ was never closed — bash syntax error crashed the script
              #   before DeployFlag could ever be published via ##vso[task.setvariable].
              # FIXED: Each OR condition is now wrapped in its own separate [ ] brackets.
              if [ "$DEPLOY" = "false" ] || [ "$DEPLOY" = "False" ] || [ "$DEPLOY" = false ]; then
                DEPLOY="false"
              else
                DEPLOY="true"
              fi

              # FIX 1 (CACHE_PRESENT): Same broken bracket syntax - original was:
              #   if [ "$CACHE_PRESENT" = true ] || [ "$CACHE_PRESENT" = "true" || "$CACHE_PRESENT" = "True" ]; then
              #   Second [ was never closed — same crash as above.
              # FIXED: Each OR condition is now wrapped in its own separate [ ] brackets.
              if [ "$CACHE_PRESENT" = "true" ] || [ "$CACHE_PRESENT" = "True" ] || [ "$CACHE_PRESENT" = true ]; then
                CACHE_PRESENT="true"
              else
                CACHE_PRESENT="false"
              fi

              # FIX 2: Comparison against bare booleans - original was:
              #   if [ "$DEPLOY" != true ] && [ "$DEPLOY" != false ]; then
              #   At this point DEPLOY is already normalized to the string "true" or "false".
              #   In bash, string "true" != bare true is ALWAYS true, so this block
              #   always printed "Invalid Deploy flag" and exited — DeployFlag was
              #   therefore NEVER published via ##vso[task.setvariable].
              # FIXED: Compare against quoted strings "true" and "false".
              if [ "$DEPLOY" != "true" ] && [ "$DEPLOY" != "false" ]; then
                echo "Invalid Deploy flag in config.yml"
                exit 1
              fi

              echo "##vso[task.setvariable variable=DeployFlag;isOutput=true]$DEPLOY"
              echo "##vso[task.setvariable variable=CacheFlag;isOutput=true]$CACHE_PRESENT"


        - task: PublishBuildArtifacts@1
          condition: eq(variables['val_task.DeployFlag'], 'false')
          inputs:
            PathtoPublish: $(Build.ArtifactStagingDirectory)
            ArtifactName: drop


# ================= BUILD STAGE =================
- stage: Build
  displayName: Build Stage
  pool:
    name: TFS-RH-1
  # NEW: Build has two valid paths to run:
  #   1. Normal push — Validation ran and succeeded
  #   2. Pull Request — Validation was skipped (Build.Reason = PullRequest),
  #      so we use skippedOrSucceeded() instead of succeeded() to allow Build
  #      to run even when Validation was intentionally skipped.
  dependsOn: Validation_Stage
  condition: in(dependencies.Validation_Stage.result, 'Succeeded', 'Skipped')
  jobs:
    - job: Build_Job
      displayName: Agent Build job
      workspace:
        clean: all
      steps:

        - checkout: self
          path: s/app

        - checkout: git://devops_testing/eis-configuration@refs/heads/config
          path: s/eis-configurations

        - task: CmdLine@2
          displayName: Building Bar file
          env:
            BRANCH: $(Build.SourceBranchName)
          inputs:
            script: |
              set -e
              . /opt/IBM/ace/server/bin/mqsiprofile

              applicationName=$(ls -1 $(Build.SourcesDirectory)/app | grep -vE "Config|README.md|azure-pipelines.yml" | tail -n 1)

              # FIX 3: Inverted directory check - original was:
              #   if [ -e ... ]; then mkdir
              #   This only ran mkdir when the directory ALREADY existed — completely wrong.
              #   When Config dir was missing, it was never created, causing downstream failures.
              # FIXED: if [ ! -e ... ]; then mkdir — creates dir only when it does NOT exist.
              if [ ! -e $(Build.SourcesDirectory)/app/Config ]; then
                mkdir -p $(Build.SourcesDirectory)/app/Config
              fi

              yq e ".$applicationName" $(Build.SourcesDirectory)/eis-configurations/"$BRANCH"_config.yml > $(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml

              if [ -s $(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml ]; then
                cat "$(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml" > $(Build.SourcesDirectory)/app/Config/config.yml
                rm $(Build.SourcesDirectory)/app/Config/config_eis_configuration.yml
              fi

              config_path=$(Build.SourcesDirectory)/app/Config/config.yml
              yq -i ".ApplicationName = \"$applicationName\"" "$config_path"

              if [ "$BRANCH" != "DEV" ]; then
                yq ".$applicationName| to_entries[] | .key + \" = \" + .value" $(Build.SourcesDirectory)/eis-configurations/"$BRANCH"_override.yml > $(Build.SourcesDirectory)/app/Config/override.properties
              fi

              if [ -f $(Build.SourcesDirectory)/app/Config/override.properties ]; then
                override_path=$(Build.SourcesDirectory)/app/Config/override.properties
              fi

              if [ -s "$override_path" ]; then
                ibmint package --input-path $(Build.SourcesDirectory)/app \
                               --output-bar-file $(Build.BinariesDirectory)/$applicationName.bar \
                               --java-version 8 \
                               --overrides-file "$override_path"
              else
                ibmint package --input-path $(Build.SourcesDirectory)/app \
                               --output-bar-file $(Build.BinariesDirectory)/$applicationName.bar \
                               --java-version 8
              fi

              mqsireadbar -b $(Build.BinariesDirectory)/$applicationName.bar -r | grep "=" | sed -e 's/^[[:space:]]*//' > $(Build.SourcesDirectory)/app/Config/override.properties
              cp $(Build.SourcesDirectory)/app/Config/* $(Build.BinariesDirectory)
              cat "$config_path"


        - task: CopyFiles@2
          inputs:
            SourceFolder: $(Build.BinariesDirectory)
            TargetFolder: $(Build.ArtifactStagingDirectory)
            OverWrite: true

        - task: PublishBuildArtifacts@1
          inputs:
            PathtoPublish: $(Build.ArtifactStagingDirectory)
            ArtifactName: drop


# ================= RELEASE STAGE =================
- stage: Release
  displayName: Deploy Stage
  pool:
    name: TFS-RH-1
  # FIX 4: Missing Validation_Stage in dependsOn - original was:
  #   dependsOn: Build
  #   Azure DevOps only exposes output variables from stages listed DIRECTLY in dependsOn.
  #   Even though Build depends on Validation, that chain does NOT carry outputs forward.
  #   So dependencies.Validation_Stage.outputs['...DeployFlag'] was resolving to null,
  #   making eq(null, 'true') = false — Release was always skipped regardless of DeployFlag value.
  # FIXED: Explicitly list both Validation_Stage and Build under dependsOn.
  dependsOn:
    - Validation_Stage
    - Build
  condition: |
    and(
      succeeded('Build'),
      eq(
        dependencies.Validation_Stage.outputs['Validation_Job.val_task.DeployFlag'],
        'true'
      ),
      ne(variables['Build.SourceBranchName'], 'main'),
      # NEW: Validation is skipped for PRs, so DeployFlag will be empty/null.
      # This check ensures Release never runs for PR triggers.
      ne(variables['Build.Reason'], 'PullRequest')
    )
  jobs:
    - deployment: DeployApp
      displayName: Deployment Job
      environment: $(Build.SourceBranchName)
      workspace:
        clean: all
      strategy:
        runOnce:
          deploy:
            steps:

              - download: current
                artifact: drop

              - task: CmdLine@2
                displayName: Deploying Bar File
                env:
                  BRANCH: $(Build.SourceBranchName)
                inputs:
                  workingDirectory: $(Pipeline.Workspace)/drop
                  script: |
                    set -e
                    . /opt/IBM/ace/server/bin/mqsiprofile

                    IntegrationNode=$(yq e ".IntegrationNode" config.yml)
                    ApplicationName=$(yq e ".ApplicationName" config.yml)
                    IntegrationServer=$(yq e ".IntegrationServer" config.yml)

                    for broker_file in /home/devops/broker/$BRANCH/$IntegrationNode*; do
                      fname=$(basename "$broker_file")
                      if [[ $fname =~ ^${IntegrationNode}_([0-9]+)\.broker$ ]]; then
                        cat "$broker_file" | grep host | awk -F"\"" '{print "HOST: " $4 " , " "IntegrationNode: " $6}'
                        ibmint deploy \
                          --input-bar-file "$ApplicationName.bar" \
                          --integration-node-file "$broker_file" \
                          --output-server "$IntegrationServer"
                      fi
                    done


# ================= CACHE STAGE =================
- stage: Cache
  displayName: CACHE
  pool:
    name: TFS-RH-1
  dependsOn:
    - Validation_Stage
    - Build
  condition: |
    and(
      succeeded('Validation_Stage'),
      eq(
        dependencies.Validation_Stage.outputs['Validation_Job.val_task.CacheFlag'],
        'true'
      ),
      or(
        eq(
          dependencies.Validation_Stage.outputs['Validation_Job.val_task.DeployFlag'],
          'false'
        ),
        succeeded('Build')
      ),
      ne(variables['Build.SourceBranchName'], 'main'),
      # NEW: Validation is skipped for PRs, so CacheFlag will be empty/null.
      # This check ensures Cache never runs for PR triggers.
      ne(variables['Build.Reason'], 'PullRequest')
    )
  jobs:
    - job: Cache_Job
      displayName: CACHE UPDATE
      workspace:
        clean: all
      steps:

        - download: current
          artifact: drop

        - task: CmdLine@2
          displayName: Update cache in Database
          env:
            BRANCH: $(Build.SourceBranchName)
          inputs:
            workingDirectory: $(Pipeline.Workspace)/drop/
            script: |
              source ~/.bashrc
              set -e
              if [ ! -f config.yml ]; then
                echo "config.yml file was not found !!"
                exit 1
              fi
              yq ".Cache[].Query" config.yml | while IFS= read -r SQL;
              do
                echo "---------------------------------------------------------"
                echo "Executing SQL Cache Query"
                echo "$SQL"
                echo "---------------------------------------------------------"
                OUTPUT=$(echo "$SQL" | isql "$BRANCH" "$DB_USER" "$DB_PASS" 2>&1)
                STATUS=$?
                if [[ $STATUS -eq 0 ]] && echo "$OUTPUT" | grep -qi "SQLRowCount"; then
                  echo "SUCCESS: Query executed"
                else
                  echo "FAILED: Query did not execute"
                  exit 1
                fi
                echo " "
              done

        - task: CmdLine@2
          displayName: Update Cache in Server
          env:
            BRANCH: $(Build.SourceBranchName)
          inputs:
            workingDirectory: $(Pipeline.Workspace)/drop/
            script: |
              set -e

              IntegrationNode=$(yq ".IntegrationNode" config.yml)
              for broker_file in /home/devops/broker/$BRANCH/$IntegrationNode*; do
                host=$(cat "$broker_file" | grep host | cut -d"\"" -f4)
                if yq -e ".Cache" config.yml >/dev/null 2>&1; then
                  # FIX 5: Removed ".$BRANCH." prefix from yq queries - original was:
                  #   yq -o=json ".$BRANCH.Cache | map(...)" config.yml
                  #   By this stage, config.yml has already been flattened in Build
                  #   (branch key removed, only flat fields remain). Using .$BRANCH.Cache
                  #   would return null since the branch key no longer exists.
                  # FIXED: Use ".Cache" directly since config is already branch-resolved.
                  response=$(curl -s -k -X POST http://"$host":8002/cache/v1/loadCache \
                    -H "Content-Type: application/json" \
                    -d "$(yq -o=json ".Cache | map({\"FIELD_NAME\": .FIELD_NAME, \"FIELD_VALUE\": .FIELD_VALUE})" config.yml)")
                  if [[ "$response" != *'"RESPONSE":"success"'* ]]; then
                    echo "Cache load failed: $response"
                    exit 1
                  fi
                  echo "Cache load successful on $host"
                  # FIX 5: Same .$BRANCH. prefix removed here as well
                  echo "$(yq -o=json ".Cache | map({\"FIELD_NAME\": .FIELD_NAME, \"FIELD_VALUE\": .FIELD_VALUE})" config.yml)"
                fi
              done
